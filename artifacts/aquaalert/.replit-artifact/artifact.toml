kind = "web"
previewPath = "/"
title = "AquaAlert"
version = "1.0.0"
id = "artifacts/aquaalert"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25475

[services.development]
run = "pnpm --filter @workspace/aquaalert run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aquaalert", "run", "build" ]
publicDir = "artifacts/aquaalert/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25475"
BASE_PATH = "/"
